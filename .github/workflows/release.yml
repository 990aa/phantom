name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        run: pip install uv==0.10.7

      - name: Build Python engine sidecar
        working-directory: ./engine
        run: |
          uv sync
          uv run pyinstaller --onefile --name phantom-engine src/phantom_engine/__main__.py
          mkdir -p ..\ui\src-tauri\binaries
          copy dist\phantom-engine.exe ..\ui\src-tauri\binaries\phantom-engine-x86_64-pc-windows-msvc.exe

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25.4.0

      - name: Build Tauri installer
        working-directory: ./ui
        env:
          TAURI_SIGNING_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          TAURI_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          npm ci
          npm run tauri build

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            ui/src-tauri/target/release/bundle/nsis/*.exe
            ui/src-tauri/target/release/bundle/msi/*.msi

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.4

      - name: Install NDK
        run: echo 'y' | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager 'ndk;26.1.10909125'

      - name: Decode Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android_app/android/app/release.keystore
          fi

      - name: Get Flutter deps
        working-directory: ./android_app
        run: flutter pub get

      - name: Build APK (release)
        working-directory: ./android_app
        env:
          ANDROID_KEYSTORE_PATH: "release.keystore"
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            android_app/build/app/outputs/flutter-apk/app-release.apk

  create-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            artifacts/windows-artifacts/*.exe \
            artifacts/windows-artifacts/*.msi \
            artifacts/android-artifacts/*.apk \
            --title 'Phantom ${{ github.ref_name }}' \
            --notes-file CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
